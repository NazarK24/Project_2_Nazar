name: Frontend Push and Deploy

on:
  push:
    paths:
      - 'frontend/**'
      - 'terraform/**'

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Docker image version
        id: version
        run: |
          VERSION=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update Dockerfile version
        run: |
          sed -i "s/^LABEL version=.*$/LABEL version=\"$IMAGE_VERSION\"/" ./frontend/Dockerfile

      - name: Commit Dockerfile changes
        if: github.ref_name == 'main'
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "GitHub Actions Bot"
          git add ./frontend/Dockerfile
          git commit -m "Update Dockerfile version to $IMAGE_VERSION" || echo "No changes to commit"
          git push origin main

  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build -t frontend:$IMAGE_VERSION ./frontend

      - name: Tag and push Docker image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/frontend:$IMAGE_VERSION
          docker tag frontend:$IMAGE_VERSION $IMAGE_URI
          docker push $IMAGE_URI

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ vars.CLUSTER_NAME}} \
            --service frontend-service \
            --force-new-deployment
